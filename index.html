<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urlaubskonto</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  .card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 50px 30px;
    border-radius: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 400px;
    width: 90%;
    animation: fadeIn 1.2s ease;
  }

  h1 {
    font-size: 24px;
    margin-bottom: 10px;
  }

  .subtitle {
    opacity: 0.9;
    margin-bottom: 40px;
  }

  .betrag {
    font-size: 70px;
    font-weight: bold;
    margin: 30px 0;
    transition: transform 0.3s ease;
  }

  .betrag.animate {
    transform: scale(1.08);
  }

  .footer {
    margin-top: 30px;
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.5;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<div class="card">
  <h1 id="title"></h1>
  <div class="subtitle">Dein aktuelles Urlaubsguthaben ✈️🌴</div>

  <div class="betrag" id="betrag">...</div>

  <div class="footer">
    Ich verwalte dieses Konto für dich ❤️<br>
    Jeder Blick hier zeigt dir den aktuellen Stand
  </div>
</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const betragEl = document.getElementById('betrag');
    const title = document.getElementById('title');

    // Titel personalisieren
    title.innerText = "Für " + data.name;

    // Betrag anzeigen
    betragEl.innerText = data.betrag.toLocaleString('de-DE') + " €";

    // kleine Animation
    setTimeout(() => {
      betragEl.classList.add('animate');
    }, 300);

  });
</script>

</body>
</html>
