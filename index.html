<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urlaubskonto</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    text-align: center;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-size: cover;
    background-position: center;
    transition: background 1s ease;
  }

  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.45);
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px 25px;
    border-radius: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    max-width: 420px;
    width: 90%;
    animation: fadeIn 1.2s ease;
  }

  h1 {
    font-size: 22px;
  }

  .betrag {
    font-size: 65px;
    font-weight: bold;
    margin: 25px 0;
  }

  .subtitle {
    margin-bottom: 20px;
    opacity: 0.9;
  }

  .history {
    margin-top: 25px;
    text-align: left;
    max-height: 150px;
    overflow-y: auto;
    font-size: 14px;
  }

  .entry {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }

  .footer {
    margin-top: 20px;
    font-size: 13px;
    opacity: 0.85;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">
  <h1 id="title"></h1>
  <div class="subtitle">Dein aktuelles Urlaubsguthaben ✈️🌴</div>

  <div class="betrag" id="betrag">...</div>

  <div class="history" id="history"></div>

  <div class="footer">
    Ich verwalte dieses Konto für dich ❤️
  </div>
</div>

<script>
// 🌅 Balaton Bilder
const images = [
  "https://images.unsplash.com/photo-1580657018950-c7f7d6a6d990",
  "https://images.unsplash.com/photo-1590080874088-eec64895b423",
  "https://images.unsplash.com/photo-1602524815607-c0bcbf0f6b82",
  "https://images.unsplash.com/photo-1593696954577-ab3d39317b97"
];

// zufälliges Bild setzen
const randomImage = images[Math.floor(Math.random() * images.length)];
document.body.style.backgroundImage = `url(${randomImage})`;

// Daten laden
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    document.getElementById('title').innerText = "Für " + data.name;
    document.getElementById('betrag').innerText = 
      data.betrag.toLocaleString('de-DE') + " €";

    // Verlauf anzeigen (neueste oben)
    const historyDiv = document.getElementById('history');

    data.einzahlungen.slice().reverse().forEach(e => {
      const entry = document.createElement('div');
      entry.className = 'entry';

      entry.innerHTML = `
        <span>${e.datum}</span>
        <span>+${e.betrag.toLocaleString('de-DE')} €</span>
      `;

      historyDiv.appendChild(entry);
    });

  });
</script>

</body>
</html>
