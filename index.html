<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Urlaubskonto</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    text-align: center;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: url('https://wallpapercave.com/wp/wp1887408.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    padding: 20px;
    box-sizing: border-box;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(
      rgba(0,0,0,0.45),
      rgba(0,0,0,0.7)
    );
    z-index: 1;
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    padding: 30px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 420px;
    animation: fadeIn 1s ease;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .subtitle {
    margin-bottom: 15px;
    font-size: 14px;
    opacity: 0.9;
  }

  .betrag {
    font-size: 52px;
    font-weight: bold;
    margin: 20px 0;
    line-height: 1.1;
  }

  .history {
    margin-top: 15px;
    text-align: left;
    max-height: 140px;
    overflow-y: auto;
    font-size: 13px;
    padding-right: 5px;
  }

  .entry {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }

  .footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.85;
    line-height: 1.4;
  }

  .history::-webkit-scrollbar {
    width: 4px;
  }

  .history::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-height: 600px) {
    .betrag {
      font-size: 42px;
    }
    .history {
      max-height: 100px;
    }
  }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">
  <h1 id="title"></h1>
  <div class="subtitle">Dein aktuelles Urlaubsguthaben ✈️🌴</div>

  <div class="betrag" id="betrag">0 €</div>

  <div class="history" id="history"></div>

  <div class="footer">
    Ich verwalte dieses Konto für dich ❤️
  </div>
</div>

<script>
// Count-Up Animation
function animateValue(element, start, end, duration) {
  let startTimestamp = null;

  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);

    const current = Math.floor(progress * (end - start) + start);
    element.innerText = current.toLocaleString('de-DE') + " €";

    if (progress < 1) {
      window.requestAnimationFrame(step);
    } else {
      element.innerText = end.toLocaleString('de-DE') + " €";
      element.style.transform = "scale(1.08)";
      setTimeout(() => {
        element.style.transform = "scale(1)";
      }, 200);
    }
  };

  window.requestAnimationFrame(step);
}

// Daten laden
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    document.getElementById('title').innerText = "Für " + data.name;

    const betragEl = document.getElementById('betrag');

    // Animation starten
    animateValue(betragEl, 0, data.betrag, 1400);

    // Verlauf anzeigen
    const historyDiv = document.getElementById('history');

    data.einzahlungen.slice().reverse().forEach(e => {
      const entry = document.createElement('div');
      entry.className = 'entry';

      entry.innerHTML = `
        <span>${e.datum}</span>
        <span>+${e.betrag.toLocaleString('de-DE')} €</span>
      `;

      historyDiv.appendChild(entry);
    });

  });
</script>

</body>
</html>
